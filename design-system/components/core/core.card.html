<!-- @dsCard group="Components" viewport="700x320" name="Core — Button, Card, Badge" subtitle="The action button, surface panels, and engraved status pills" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 28px; background: var(--bg); font-family: var(--font-body); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .2em; margin-bottom: 12px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 24px; }
  .lucide { width: 17px; height: 17px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Button, Card, Badge } = window.BTCSaveDesignSystem_85fada;
  function LI({ name, size = 17 }) { const r = React.useRef(null); React.useEffect(() => { if (window.lucide) lucide.createIcons(); }); return <span ref={r} style={{ display: "inline-flex" }}><i data-lucide={name} style={{ width: size, height: size }}></i></span>; }
  function Demo() {
    return (
      <div>
        <div className="lbl">Button</div>
        <div className="row">
          <Button trailingIcon={<LI name="arrow-right" />}>Join the waitlist</Button>
          <Button variant="secondary" leadingIcon={<LI name="shield-check" />}>Proof of reserves</Button>
          <Button variant="ghost">Learn more</Button>
          <Button size="sm">Small</Button>
          <Button disabled>Disabled</Button>
        </div>
        <div className="lbl">Badge</div>
        <div className="row">
          <Badge tone="safe" dot>Healthy</Badge>
          <Badge tone="caution">Approaching limit</Badge>
          <Badge tone="danger" dot>Liquidation risk</Badge>
          <Badge tone="orange">Non-custodial</Badge>
          <Badge>Pending</Badge>
        </div>
        <div className="lbl">Card</div>
        <div className="row" style={{ alignItems: "stretch", marginBottom: 0 }}>
          <Card style={{ flex: 1 }}><div style={{ color: "var(--ink)", fontWeight: 600 }}>Plain surface</div><div style={{ color: "var(--muted)", fontSize: 13, marginTop: 4 }}>The default panel.</div></Card>
          <Card tone="inset" style={{ flex: 1 }}><div style={{ color: "var(--ink)", fontWeight: 600 }}>Inset</div><div style={{ color: "var(--muted)", fontSize: 13, marginTop: 4 }}>Recessed block.</div></Card>
          <Card tone="raised" interactive style={{ flex: 1 }}><div style={{ color: "var(--ink)", fontWeight: 600 }}>Raised</div><div style={{ color: "var(--muted)", fontSize: 13, marginTop: 4 }}>Elevated, lifts on hover.</div></Card>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
