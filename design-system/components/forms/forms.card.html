<!-- @dsCard group="Components" viewport="700x200" name="Forms — Input" subtitle="Dark field with orange focus ring; mono mode and prefix/suffix for amounts" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 28px; background: var(--bg); font-family: var(--font-body); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .2em; margin-bottom: 10px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Input } = window.BTCSaveDesignSystem_85fada;
  function Demo() {
    const [a, setA] = React.useState(""); const [b, setB] = React.useState("");
    return (
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24, maxWidth: 620 }}>
        <div><div className="lbl">Email</div><Input type="email" placeholder="you@email.com" value={a} onChange={(e) => setA(e.target.value)} /></div>
        <div><div className="lbl">Amount</div><Input mono prefix="$" suffix="USDT" placeholder="0.00" value={b} onChange={(e) => setB(e.target.value)} /></div>
        <div><div className="lbl">Invalid</div><Input invalid placeholder="Required field" /></div>
        <div><div className="lbl">Disabled</div><Input disabled placeholder="Locked" /></div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
