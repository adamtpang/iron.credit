<!-- @dsCard group="Spacing" viewport="700x150" name="Radius scale" subtitle="Small, machined edges (3–16px). Sharp = engineered, not playful." -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--bg); }
  .row { display: flex; gap: 16px; align-items: flex-end; }
  .item { text-align: center; }
  .box { width: 82px; height: 64px; background: var(--surface-3); border: 1.5px solid var(--line-2); }
  .lab { font-family: var(--font-body); font-size: 12px; color: var(--ink); font-weight: 600; margin-top: 8px; }
  .val { font-family: var(--font-mono); font-size: 10.5px; color: var(--muted); }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:3px"></div><div class="lab">xs</div><div class="val">3px</div></div>
    <div class="item"><div class="box" style="border-radius:5px"></div><div class="lab">sm</div><div class="val">5 · buttons</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="lab">md</div><div class="val">8 · cards</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="lab">lg</div><div class="val">12 · panels</div></div>
    <div class="item"><div class="box" style="border-radius:14px"></div><div class="lab">card</div><div class="val">14 · the card</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="lab">xl</div><div class="val">16px</div></div>
  </div>
</body></html>
