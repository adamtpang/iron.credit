<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4 → 128px. Generous negative space; panels pad 24px." -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--bg); }
  .r { display: flex; align-items: center; gap: 12px; padding: 3px 0; }
  .bar { height: 14px; background: var(--iron-orange); border-radius: 2px; }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--muted); width: 150px; flex-shrink: 0; }
</style></head>
<body>
  <div class="r"><div class="lab">2 · 8px</div><div class="bar" style="width:8px"></div></div>
  <div class="r"><div class="lab">3 · 12px · gap</div><div class="bar" style="width:12px"></div></div>
  <div class="r"><div class="lab">4 · 16px</div><div class="bar" style="width:16px"></div></div>
  <div class="r"><div class="lab">6 · 24px · pad</div><div class="bar" style="width:24px"></div></div>
  <div class="r"><div class="lab">7 · 32px</div><div class="bar" style="width:32px"></div></div>
  <div class="r"><div class="lab">9 · 56px · section</div><div class="bar" style="width:56px"></div></div>
  <div class="r"><div class="lab">12 · 96px</div><div class="bar" style="width:96px"></div></div>
</body></html>
