<!-- @dsCard group="Spacing" viewport="700x170" name="Shadows & elevation" subtitle="Deep, soft, low-key. Mostly for raised dark UI and the card." -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 28px 24px; background: var(--bg); }
  .row { display: flex; gap: 26px; }
  .item { text-align: center; }
  .box { width: 130px; height: 66px; background: var(--surface-3); border: 1px solid var(--line); border-radius: var(--radius-md); }
  .lab { font-family: var(--font-body); font-size: 12px; color: var(--ink); font-weight: 600; margin-top: 12px; }
  .val { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lab">sm</div><div class="val">subtle</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-card)"></div><div class="lab">card</div><div class="val">raised panel</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lift)"></div><div class="lab">lift</div><div class="val">overlay / hover</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-card-heavy)"></div><div class="lab">heavy</div><div class="val">the Iron card</div></div>
  </div>
</body></html>
