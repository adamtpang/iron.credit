<!-- @dsCard group="Type" viewport="700x190" name="Data — IBM Plex Mono" subtitle="Tabular figures for rates, LTV, prices. Precision = credibility." -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; background: var(--bg); font-family: var(--font-mono); color: var(--ink); }
  .big { font-size: 38px; font-weight: 500; letter-spacing: -.01em; font-variant-numeric: tabular-nums; }
  .big span { color: var(--muted); font-size: 20px; }
  .rows { margin-top: 14px; display: grid; gap: 5px; font-size: 14px; }
  .r { display: flex; justify-content: space-between; max-width: 320px; }
  .r span:first-child { color: var(--muted); }
  .safe { color: var(--safe); }
  .cau { color: var(--caution); }
  .tag { font-size: 11px; color: var(--muted); margin-top: 14px; letter-spacing: .1em; }
</style></head>
<body>
  <div class="big">$24,000<span> credit line</span></div>
  <div class="rows">
    <div class="r"><span>LTV</span><span class="safe">22%</span></div>
    <div class="r"><span>APR</span><span>9.5%</span></div>
    <div class="r"><span>Liquidation</span><span class="cau">$42,180</span></div>
  </div>
  <div class="tag">IBM PLEX MONO · 400 / 500 / 600 · TABULAR</div>
</body></html>
