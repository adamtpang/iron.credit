<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg); }
  .stamp { display: inline-block; border: 1px solid var(--line-2); border-radius: 4px; padding: 8px 14px; margin-bottom: 16px; }
  .head { font-family: var(--font-display); font-weight: 600; font-size: 26px; color: var(--ink); letter-spacing: -.01em; }
  .head em { font-style: italic; color: var(--iron-orange); }
  .sub { font-family: var(--font-body); font-size: 14px; color: var(--muted); margin-top: 8px; max-width: 540px; line-height: 1.5; }
</style></head>
<body>
  <span class="stamp iron-eyebrow">The bank that always collects its due</span>
  <div class="head">Keep your bitcoin. <em>Spend dollars.</em></div>
  <div class="sub">No hype, no jargon. We state the rate, the LTV, and the liquidation price plainly, and we never touch your coins. Strength you can verify.</div>
</body></html>
