<!-- @dsCard group="Colors" viewport="700x150" name="Light theme" subtitle="data-theme=light — cool paper, same restrained orange" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 18px; background: #eef0f2; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: 5px; border: 1px solid #dfe3e7; overflow: hidden; }
  .chip { height: 60px; }
  .meta { padding: 7px 9px; background: #ffffff; }
  .name { font-family: var(--font-body); font-size: 12px; font-weight: 600; color: #14171b; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: #586069; margin-top: 2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#eef0f2"></div><div class="meta"><div class="name">bg</div><div class="hex">#eef0f2</div></div></div>
    <div class="sw"><div class="chip" style="background:#ffffff"></div><div class="meta"><div class="name">surface</div><div class="hex">#ffffff</div></div></div>
    <div class="sw"><div class="chip" style="background:#f4f6f8"></div><div class="meta"><div class="name">surface-2</div><div class="hex">#f4f6f8</div></div></div>
    <div class="sw"><div class="chip" style="background:#dfe3e7"></div><div class="meta"><div class="name">line</div><div class="hex">#dfe3e7</div></div></div>
    <div class="sw"><div class="chip" style="background:#586069"></div><div class="meta"><div class="name">muted</div><div class="hex">#586069</div></div></div>
    <div class="sw"><div class="chip" style="background:#14171b"></div><div class="meta"><div class="name">ink</div><div class="hex">#14171b</div></div></div>
    <div class="sw"><div class="chip" style="background:#16181c"></div><div class="meta"><div class="name">accent (ink)</div><div class="hex">#16181c</div></div></div>
  </div>
</body></html>
