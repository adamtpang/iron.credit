<!-- @dsCard group="Colors" viewport="700x150" name="Iron neutral ramp" subtitle="Cool near-black to off-white. The dark default surfaces." -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--bg); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-sm); border: 1px solid var(--line); overflow: hidden; }
  .chip { height: 60px; }
  .meta { padding: 7px 9px; background: var(--surface); }
  .name { font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--ink); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#0a0b0d"></div><div class="meta"><div class="name">bg</div><div class="hex">#0a0b0d</div></div></div>
    <div class="sw"><div class="chip" style="background:#121418"></div><div class="meta"><div class="name">surface</div><div class="hex">#121418</div></div></div>
    <div class="sw"><div class="chip" style="background:#181b20"></div><div class="meta"><div class="name">surface-2</div><div class="hex">#181b20</div></div></div>
    <div class="sw"><div class="chip" style="background:#20242b"></div><div class="meta"><div class="name">surface-3</div><div class="hex">#20242b</div></div></div>
    <div class="sw"><div class="chip" style="background:#282d35"></div><div class="meta"><div class="name">line</div><div class="hex">#282d35</div></div></div>
    <div class="sw"><div class="chip" style="background:#939aa4"></div><div class="meta"><div class="name">muted</div><div class="hex">#939aa4</div></div></div>
    <div class="sw"><div class="chip" style="background:#f3f5f7"></div><div class="meta"><div class="name">ink</div><div class="hex">#f3f5f7</div></div></div>
  </div>
</body></html>
