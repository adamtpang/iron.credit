<!-- @dsCard group="Colors" viewport="700x150" name="Accent & metal" subtitle="No colour accent — platinum is the brightest element; steel & gunmetal for the card" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--bg); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-sm); border: 1px solid var(--line); overflow: hidden; }
  .chip { height: 60px; }
  .meta { padding: 7px 9px; background: var(--surface); }
  .name { font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--ink); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#e7eaed"></div><div class="meta"><div class="name">platinum</div><div class="hex">#e7eaed · accent</div></div></div>
    <div class="sw"><div class="chip" style="background:#ffffff"></div><div class="meta"><div class="name">bright</div><div class="hex">#ffffff · hover</div></div></div>
    <div class="sw"><div class="chip" style="background:#c8cdd2"></div><div class="meta"><div class="name">press</div><div class="hex">#c8cdd2</div></div></div>
    <div class="sw"><div class="chip" style="background:rgba(231,234,237,.09)"></div><div class="meta"><div class="name">soft</div><div class="hex">9% · tint</div></div></div>
    <div class="sw"><div class="chip" style="background:linear-gradient(135deg,#e8eaed,#b7bdc5 32%,#d2d7dc 52%,#8b919b 78%,#c2c7cd)"></div><div class="meta"><div class="name">steel sheen</div><div class="hex">brushed</div></div></div>
    <div class="sw"><div class="chip" style="background:linear-gradient(150deg,#2a2e34,#16181c 46%,#1f2329 78%,#101216)"></div><div class="meta"><div class="name">gunmetal</div><div class="hex">card</div></div></div>
  </div>
</body></html>
