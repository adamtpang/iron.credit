<!-- @dsCard group="Colors" viewport="700x150" name="Finance semantics" subtitle="LTV health: safe, caution, danger. Transparent, never alarmist." -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 18px; background: var(--bg); }
  .row { display: flex; gap: 10px; align-items: stretch; }
  .sw { flex: 1; border-radius: var(--radius-sm); border: 1px solid var(--line); overflow: hidden; }
  .chip { height: 60px; }
  .meta { padding: 7px 9px; background: var(--surface); }
  .name { font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--ink); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 2px; }
  .note { flex: 1.5; border-radius: var(--radius-sm); border: 1px solid var(--line); background: var(--surface); padding: 10px 13px; display: flex; flex-direction: column; justify-content: center; }
  .note b { font-family: var(--font-body); font-size: 12.5px; color: var(--ink); }
  .note p { font-family: var(--font-body); font-size: 11.5px; line-height: 1.45; color: var(--muted); margin: 4px 0 0; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#aeb4b8"></div><div class="meta"><div class="name">safe</div><div class="hex">#aeb4b8</div></div></div>
    <div class="sw"><div class="chip" style="background:#9a948b"></div><div class="meta"><div class="name">caution</div><div class="hex">#9a948b</div></div></div>
    <div class="sw"><div class="chip" style="background:#b58e88"></div><div class="meta"><div class="name">danger</div><div class="hex">#b58e88</div></div></div>
    <div class="note"><b>Restraint over alarm</b><p>Health reads through desaturated near-greys, never a casino green or red. A faint clay marks genuine risk. The numbers carry the message; colour only nudges.</p></div>
  </div>
</body></html>
