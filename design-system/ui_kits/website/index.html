<!-- @dsCard group="Website" viewport="1200x880" name="Iron landing page" subtitle="Keep your bitcoin, spend dollars — hero, how-it-works, open terms, trust, the card, waitlist" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Iron — Keep your bitcoin. Spend dollars.</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; }
  @media (max-width: 900px) {
    .iron-hero, .iron-numbers, .iron-trust, .iron-who, .iron-cardsec, .iron-steps { grid-template-columns: 1fr !important; }
    .iron-navlinks { display: none !important; }
  }
  @media (max-width: 620px) {
    .iron-trust { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>

<script src="../dsboot.js"></script>
<script type="text/babel" src="Icon.jsx"></script>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Landing.jsx"></script>

<script type="text/babel" data-presets="react">
  (async () => {
    window.DS = await window.bootDS("../../components/");

    function App() {
      const [theme, setTheme] = React.useState("dark");
      React.useEffect(() => {
        document.documentElement.dataset.theme = theme === "light" ? "light" : "";
        if (window.lucide) window.lucide.createIcons();
      }, [theme]);
      const scrollWaitlist = () => { const el = document.getElementById("waitlist"); if (el) window.scrollTo({ top: el.offsetTop - 40, behavior: "smooth" }); };
      return (
        <React.Fragment>
          <window.IronNav theme={theme} onToggleTheme={() => setTheme((t) => (t === "dark" ? "light" : "dark"))} onWaitlist={scrollWaitlist} links={["How it works", "Rates", "Trust", "The card"]} />
          <window.IronLanding onWaitlist={scrollWaitlist} />
        </React.Fragment>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  })();
</script>
</body>
</html>
