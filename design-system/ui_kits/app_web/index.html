<!-- @dsCard group="Web app" viewport="1280x840" name="Iron credit console" subtitle="The transparent dashboard — collateral, credit line, live LTV & liquidation, card, repay, proof of reserves" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Iron — Credit console</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { margin: 0; height: 100%; }
  #root { height: 100vh; }
  @media (max-width: 860px) { .aw-grid { grid-template-columns: 1fr !important; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>

<script src="../dsboot.js"></script>
<script type="text/babel" src="../website/Icon.jsx"></script>
<script type="text/babel" src="Sidebar.jsx"></script>
<script type="text/babel" src="AppWeb.jsx"></script>

<script type="text/babel" data-presets="react">
  (async () => {
    window.DS = await window.bootDS("../../components/");

    function App() {
      const [theme, setTheme] = React.useState("dark");
      const [view, setView] = React.useState("dashboard");
      const [btc] = React.useState(0.412);
      const [price] = React.useState(68000);
      const [drawn, setDrawn] = React.useState(5600);
      React.useEffect(() => { document.documentElement.dataset.theme = theme === "light" ? "light" : ""; if (window.lucide) window.lucide.createIcons(); }, [theme, view, drawn]);
      const st = { btc, price, drawn, c: window.IronCompute(btc, price, drawn) };

      const titles = { dashboard: <window.IronDashboard st={st} setDrawn={setDrawn} />, card: <window.IronCardView st={st} />, activity: <window.IronActivity />, proof: <window.IronProof /> };
      return (
        <div style={{ display: "flex", height: "100%", background: "var(--bg)" }}>
          <window.IronSidebar view={view} setView={setView} theme={theme} onToggleTheme={() => setTheme((t) => (t === "dark" ? "light" : "dark"))} />
          <main style={{ flex: 1, overflowY: "auto", padding: "32px 40px" }}>
            <div style={{ maxWidth: 980, margin: "0 auto" }}>{titles[view]}</div>
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  })();
</script>
</body>
</html>
